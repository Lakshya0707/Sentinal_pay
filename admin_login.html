<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Sentinel AI</title>
<style>
:root {
  --bg0:#060810; --bg1:#0c0f1a; --bg2:#111624;
  --text1:#e8ecf4; --text2:rgba(255,255,255,0.55);
  --c-blue:rgba(100,160,255,0.9);
  --border:rgba(255,255,255,0.06);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg0);
  color:var(--text1);
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  background-image:radial-gradient(ellipse at 50% -10%, rgba(0,80,200,0.08), transparent 70%);
}
.login-container {
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:12px;
  padding:40px;
  width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.logo {
  text-align:center;
  margin-bottom:30px;
}
.logo-icon {
  font-size:48px;
  margin-bottom:10px;
}
.logo-text {
  font-size:24px;
  font-weight:700;
  color:#fff;
  letter-spacing:-0.02em;
}
.logo-sub {
  font-size:11px;
  color:var(--text2);
  letter-spacing:0.2em;
  margin-top:5px;
}
.form-group {
  margin-bottom:20px;
}
.form-group label {
  display:block;
  font-size:12px;
  color:var(--text2);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:0.1em;
}
.form-group input {
  width:100%;
  padding:12px 16px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text1);
  font-size:14px;
  transition:border 0.3s;
}
.form-group input:focus {
  outline:none;
  border-color:var(--c-blue);
}
.btn-login {
  width:100%;
  padding:14px;
  background:linear-gradient(135deg, #ff3b5c, #ff8c42);
  border:none;
  border-radius:6px;
  color:#fff;
  font-size:14px;
  font-weight:700;
  letter-spacing:0.1em;
  cursor:pointer;
  transition:transform 0.2s, box-shadow 0.2s;
}
.btn-login:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(255,59,92,0.3);
}
.alert {
  padding:12px;
  background:rgba(255,59,92,0.1);
  border:1px solid rgba(255,59,92,0.3);
  border-radius:6px;
  color:#ff3b5c;
  font-size:13px;
  margin-bottom:20px;
}
.demo-creds {
  margin-top:20px;
  padding:15px;
  background:rgba(100,160,255,0.05);
  border:1px solid rgba(100,160,255,0.2);
  border-radius:6px;
  font-size:12px;
  color:var(--text2);
}
.demo-creds strong {
  color:var(--c-blue);
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">SENTINEL AI</div>
    <div class="logo-sub">ADMIN PANEL</div>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    
    <button type="submit" class="btn-login">LOGIN</button>
  </form>
</div>

</body>
</html>
